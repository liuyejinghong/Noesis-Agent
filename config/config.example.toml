mode = "backtest"
symbol = "BTCUSDT"
timeframe = "15m"

[risk]
max_position_size = 0.01
max_leverage = 3
read_only = false
max_daily_loss_pct = 0.05

[trade_management]
stop_loss_pct = 0.02
take_profit_pct = 0.04
trailing_stop_pct = 0.015
max_holding_bars = 120
cooldown_bars = 4
confirm_bars = 2

[exchange]
exchange_id = "binance_usdm"
account_type = "futures"
base_url = "https://fapi.binance.com"
api_key_env = "BINANCE_API_KEY"
api_secret_env = "BINANCE_API_SECRET"

[agent_roles.researcher]
model = "openai:gpt-4o"
fallback = "openai:gpt-4o-mini"
system_prompt = "Research market structure and summarize trade ideas."
tools = ["market_data", "feature_store"]
output_format = "text"

[agent_roles.reviewer]
model = "openai:gpt-4o"
system_prompt = "Review proposals for risk, execution constraints, and evidence quality."
tools = ["portfolio_state", "risk_report"]
output_format = "json"
