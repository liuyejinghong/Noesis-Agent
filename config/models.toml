[providers.claude_relay]
name = "Claude-aipai"
type = "relay"
base_url = "https://api.aipaibox.com/v1"
api_key_env = "AIPAIBOX_CLAUDE_API_KEY"

[providers.gemini_relay]
name = "Gemini-aipai"
type = "relay"
base_url = "https://api.aipaibox.com/v1"
api_key_env = "AIPAIBOX_GEMINI_API_KEY"

[providers.gpt_oauth]
name = "GPT-OAuth"
type = "oauth_openai"

[models.claude-opus-4-6]
provider = "claude_relay"
tier = "high"
capabilities = ["analysis", "reasoning", "code", "chinese"]
cost = "$$"

[models.claude-sonnet-4-6]
provider = "claude_relay"
tier = "mid"
capabilities = ["analysis", "reasoning", "code", "chinese"]
cost = "$"

[models."gemini-3.1-pro-high"]
provider = "gemini_relay"
tier = "mid"
capabilities = ["analysis", "reasoning"]
cost = "$"
known_issues = "tool calling broken via relay: max_tokens causes empty response"

[models.gemini-3-flash]
provider = "gemini_relay"
tier = "low"
capabilities = ["formatting", "summarization"]
cost = "c"
known_issues = "tool calling broken via relay: text-only tasks work fine"

[models."gpt-5.4"]
provider = "gpt_oauth"
tier = "high"
capabilities = ["reasoning", "code", "analysis", "chinese"]
cost = "plus_quota"
notes = "hidden model - not in models list API but directly callable via Plus"

[models."gpt-5.4-mini"]
provider = "gpt_oauth"
tier = "mid"
capabilities = ["reasoning", "code", "analysis"]
cost = "plus_quota"
notes = "hidden model - not in models list API but directly callable via Plus"

[models."gpt-5.2"]
provider = "gpt_oauth"
tier = "high"
capabilities = ["reasoning", "code", "analysis"]
cost = "plus_quota"

[models."gpt-5.1"]
provider = "gpt_oauth"
tier = "mid"
capabilities = ["reasoning", "code", "analysis"]
cost = "plus_quota"

[models.gpt-5]
provider = "gpt_oauth"
tier = "mid"
capabilities = ["reasoning", "code"]
cost = "plus_quota"
